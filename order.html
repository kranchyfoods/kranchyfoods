<!DOCTYPE html>
<html>
<head>
<title>Order - Kranchy's</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial,sans-serif;
background:#FFD400;
padding:20px;
margin:0;
}

form{
background:white;
padding:25px;
border-radius:18px;
max-width:700px;
margin:auto;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

button{
background:black;
color:white;
padding:15px;
border:none;
width:100%;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
input[type=text],
input[type=tel],
input[type=number],
select,
textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
box-sizing:border-box;
}
.option{
margin:10px 0;
}

.option input{
width:auto;
margin-right:10px;
}

.option label{
display:inline;
font-weight:normal;
}

</style>
</head>

<body>

<form>

<h1>Place Your Order</h1>

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Phone Number</label>
<input type="tel" placeholder="Enter your phone number">

<h3>Select Meals</h3>

<div class="option">
<input type="checkbox" id="pipeline40">
<label for="pipeline40">Kenkey Pipeline - GHS40</label>
</div>

<div class="option">
<input type="checkbox" id="peter65">
<label for="peter65">Kenkey Peterlover - GHS65</label>
</div>

<div class="option">
<input type="checkbox" id="beloved80">
<label for="beloved80">Kenkey Beloved - GHS80</label>
</div>

<div class="option">
<input type="checkbox" id="pipeline50">
<label for="pipeline50">Pipeline - GHS50</label>
</div>

<div class="option">
<input type="checkbox" id="peter70">
<label for="peter70">Peterlover - GHS70</label>
</div>

<div class="option">
<input type="checkbox" id="well95">
<label for="well95">Well Pack - GHS95</label>
</div>

<div class="option">
<input type="checkbox" id="chic35">
<label for="chic35">ChicBox - GHS35</label>
</div>

<div class="option">
<input type="checkbox" id="pork50">
<label for="pork50">Pork Box - GHS50</label>
</div>

<div class="option">
<input type="checkbox" id="chop100">
<label for="chop100">ChopBox - GHS100</label>
</div>

<h3>Protein Choice (Kenkey Meals)</h3>

<label>
<input type="radio" name="protein">
Pork
</label>

<br>

<label>
<input type="radio" name="protein">
Wings
</label>

<h3>Extras</h3>

<label><input type="checkbox"> Cheese (+GHS10)</label><br>
<label><input type="checkbox"> Shrimps (+GHS20)</label><br>
<label><input type="checkbox"> Fried Egg (+GHS5)</label><br>
<label><input type="checkbox"> Sausage (+GHS5)</label><br>
<label><input type="checkbox"> Gizzard (+GHS10)</label><br>
<label><input type="checkbox"> Shito (+GHS5)</label>

<h3>Drinks</h3>

<label><input type="checkbox"> Coke (+GHS10)</label><br>
<label><input type="checkbox"> Fanta (+GHS10)</label><br>
<label><input type="checkbox"> Malt (+GHS15)</label><br>
<label><input type="checkbox"> BB Cocktail (+GHS15)</label><br>
<label><input type="checkbox"> Water (+GHS5)</label>

<h3>Quantity</h3>

<input type="number" value="1" min="1">
<h3>Spicy Level</h3>

<div class="option">
<input type="radio" name="spice">
<label>Mild 🌶️</label>
</div>

<div class="option">
<input type="radio" name="spice">
<label>Medium 🌶️🌶️</label>
</div>

<div class="option">
<input type="radio" name="spice">
<label>Hot 🌶️🌶️🌶️</label>
</div>
<label>Order Notes</label>
<textarea placeholder="Special instructions"></textarea>

<h3>Order Type</h3>

<label>
<input type="radio" name="ordertype">
Pickup
</label>

<label>
<input type="radio" name="ordertype">
Delivery
</label>

<h3>Mobile Money Payment</h3>

<p>Pay To:</p>

<h2>0538808906</h2>

<p>Kranchy's Foods</p>

<p>
After payment, send screenshot to WhatsApp:
<strong>0542163246</strong>
</p>

<button>
Place Order
</button>

</form>

</body>
</html>
