<!DOCTYPE html>
<html>
<head>
<title>Order - Kranchy's</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#FFD400;
padding:20px;
}

form{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
}

button{
background:black;
color:white;
padding:15px;
border:none;
width:100%;
}

</style>
</head>

<body>

<form>

<h1>Place Your Order</h1>

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Phone Number</label>
<input type="tel" placeholder="Enter your phone number">

<label>Select Meal</label>
<select id="meal">
<option>Kenkey Pipeline - GHS40</option>
<option>Kenkey Peterlover - GHS65</option>
<option>Kenkey Beloved - GHS80</option>

<option>Pipeline - GHS50</option>
<option>Peterlover - GHS70</option>
<option>Well Pack - GHS95</option>

<option>ChicBox - GHS35</option>
<option>Pork Box - GHS50</option>
<option>ChopBox - GHS100</option>
</select>

<h3>Protein Choice (Kenkey Meals)</h3>

<label>
<input type="radio" name="protein">
Pork
</label>

<br>

<label>
<input type="radio" name="protein">
Wings
</label>

<h3>Extras</h3>

<label><input type="checkbox"> Cheese (+GHS10)</label><br>
<label><input type="checkbox"> Shrimps (+GHS20)</label><br>
<label><input type="checkbox"> Fried Egg (+GHS5)</label><br>
<label><input type="checkbox"> Sausage (+GHS5)</label><br>
<label><input type="checkbox"> Gizzard (+GHS10)</label><br>
<label><input type="checkbox"> Shito (+GHS5)</label>

<h3>Drinks</h3>

<label><input type="checkbox"> Coke (+GHS10)</label><br>
<label><input type="checkbox"> Fanta (+GHS10)</label><br>
<label><input type="checkbox"> Malt (+GHS15)</label><br>
<label><input type="checkbox"> BB Cocktail (+GHS15)</label><br>
<label><input type="checkbox"> Water (+GHS5)</label>

<h3>Quantity</h3>

<input type="number" value="1" min="1">

<label>Order Notes</label>
<textarea placeholder="Special instructions"></textarea>

<h3>Order Type</h3>

<label>
<input type="radio" name="ordertype">
Pickup
</label>

<label>
<input type="radio" name="ordertype">
Delivery
</label>

<h3>Mobile Money Payment</h3>

<p>Pay To:</p>

<h2>0538808906</h2>

<p>Kranchy's Foods</p>

<p>
After payment, send screenshot to WhatsApp:
<strong>0542163246</strong>
</p>

<button>
Place Order
</button>

</form>

</body>
</html>
